version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: qa-postgres
    environment:
      POSTGRES_DB: testdb
      POSTGRES_USER: qa_user
      POSTGRES_PASSWORD: qa_pass123
    ports:
      - "5432:5432"
    volumes:
      - ./app/init_db.sql:/docker-entrypoint-initdb.d/init.sql
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U qa_user -d testdb"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build: ./app
    container_name: qa-app
    ports:
      - "5000:5000"
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://qa_user:qa_pass123@postgres:5432/testdb
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 10s
      timeout: 5s
      retries: 3

volumes:
  postgres_data: